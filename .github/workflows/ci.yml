name: NoOrg validation

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: noorg-dist
          path: dist/

  manuscript-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx puppeteer browsers install chrome-headless-shell
      - run: npm run manuscript:evidence
      - run: npm run manuscript:figures
      - run: npm run manuscript:hydrate
      - run: npm run manuscript:validate
      - uses: actions/upload-artifact@v4
        with:
          name: noorg-manuscript-source-evidence
          path: docs/manuscript/output/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run validate:text

  live-provider:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:live
        env:
          NOORG_LLM_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  container:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag noorg:ci .
