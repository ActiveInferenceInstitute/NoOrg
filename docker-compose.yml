services:
  noorg:
    build: .
    ports:
      - "${NOORG_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NOORG_STATE_PATH: /app/data/state.json
    volumes:
      - noorg-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  noorg-data:
